<style>
:root {
  color-scheme: light;
  --bg: #FAF9F6;
  --card: #FFFFFF;
  --primary: #7B6D5E;
  --primary-light: #A89B8C;
  --accent: #C9A96E;
  --accent-light: #E8D5B0;
  --rose: #D4A0A0;
  --rose-light: #F0D6D6;
  --sage: #8FA68A;
  --sage-light: #C7D9C3;
  --text: #3A3530;
  --text-light: #7A756E;
  --border: #E8E4DF;
  --danger: #C0392B;
  --warning: #E67E22;
  --success: #27AE60;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.header { background: linear-gradient(135deg, #7B6D5E 0%, #A89B8C 50%, #C9A96E 100%); color: white; padding: 32px 24px; text-align: center; position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%); }
.header h1 { font-size: 28px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 4px; }
.header .date { font-size: 15px; opacity: 0.9; letter-spacing: 2px; margin-bottom: 16px; }
.countdown { display: flex; justify-content: center; gap: 20px; margin-top: 8px; }
.countdown-item { text-align: center; }
.countdown-item .num { font-size: 32px; font-weight: 700; line-height: 1; }
.countdown-item .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
.nav { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 8px; position: sticky; top: 0; z-index: 100; }
.nav button { flex-shrink: 0; padding: 12px 16px; border: none; background: none; color: var(--text-light); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.nav button:hover { color: var(--primary); }
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); }
.card h2 { font-size: 18px; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.stat-card .stat-num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-top: 2px; }
.stat-card.accent .stat-num { color: var(--accent); }
.stat-card.rose .stat-num { color: var(--rose); }
.stat-card.sage .stat-num { color: var(--sage); }
.progress-wrap { margin-bottom: 12px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; background: #F5F3F0; color: var(--primary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: #FDFCFA; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-yes { background: #D4EDDA; color: #155724; }
.badge-no { background: #F8D7DA; color: #721C24; }
.badge-waiting { background: #FFF3CD; color: #856404; }
.badge-done { background: var(--sage-light); color: #2D5A27; }
.badge-pending { background: var(--accent-light); color: #7A6520; }
.phase-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
.phase-header h3 { color: white; margin: 0; font-size: 14px; }
.phase-header .phase-count { font-size: 12px; opacity: 0.8; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
.check-item:hover { background: #F5F3F0; }
.check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--sage); cursor: pointer; flex-shrink: 0; }
.check-item label { cursor: pointer; font-size: 13px; flex: 1; }
.check-item.checked label { text-decoration: line-through; color: var(--text-light); }
input[type="text"], input[type="number"], input[type="date"], input[type="url"], input[type="tel"], input[type="email"], select, textarea {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; width: 100%; background: white;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #B8943F; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary); }
.btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.seating-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.table-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; transition: all 0.2s; }
.table-card.sweetheart { border-color: var(--accent); background: linear-gradient(135deg, #FDF6E9, #FFF9F0); }
.table-card .table-name { font-weight: 700; font-size: 13px; color: var(--primary); margin-bottom: 8px; }
.table-card .table-guests { font-size: 12px; color: var(--text-light); }
.table-card .guest-name { padding: 3px 0; font-size: 12px; }
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 16px; padding: 8px 12px; border-radius: 8px; transition: background 0.15s; }
.timeline-item:hover { background: #F5F3F0; }
.timeline-item::before { content: ''; position: absolute; left: -24px; top: 14px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid white; box-shadow: 0 0 0 2px var(--accent); }
.timeline-item .time { font-size: 12px; font-weight: 700; color: var(--accent); }
.timeline-item .event { font-size: 13px; color: var(--text); }
.timeline-item .detail { font-size: 11px; color: var(--text-light); }
.sub-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.sub-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; cursor: pointer; transition: all 0.2s; color: var(--text-light); }
.sub-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.registry-cat { margin-bottom: 12px; }
.registry-cat-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #F5F3F0; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
.registry-items { padding: 4px 12px; }
.registry-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F0EDE8; font-size: 13px; }
.registry-item:last-child { border: none; }
.registry-item input[type="checkbox"] { accent-color: var(--sage); }
.itinerary-day { display: flex; align-items: flex-start; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.itinerary-day:last-child { border: none; }
.day-num { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 16px; flex-shrink: 0; }
.day-info { flex: 1; }
.day-info h4 { font-size: 14px; margin-bottom: 2px; }
.day-info p { font-size: 12px; color: var(--text-light); }
.inline-edit { border: none; background: transparent; font: inherit; color: inherit; padding: 2px 4px; border-radius: 4px; }
.inline-edit:hover { background: var(--accent-light); }
.inline-edit:focus { background: white; border: 1px solid var(--accent); box-shadow: 0 0 0 3px rgba(201,169,110,0.15); outline: none; }
.venue-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: box-shadow 0.2s; }
.venue-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.venue-card.favorite { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.venue-header { padding: 16px 20px; background: linear-gradient(135deg, #F5F3F0, #FDFCFA); display: flex; justify-content: space-between; align-items: flex-start; }
.venue-body { padding: 16px 20px; }
.venue-field { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F0EDE8; font-size: 13px; }
.venue-field:last-child { border: none; }
.venue-field .vf-label { color: var(--text-light); font-weight: 500; min-width: 110px; }
.venue-field .vf-value { text-align: right; flex: 1; }
.venue-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.venue-pros-cons > div { padding: 10px; border-radius: 8px; font-size: 12px; }
.venue-pros { background: #EDF7ED; }
.venue-cons { background: #FDF0EE; }
.star-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
.del-x { cursor: pointer; color: var(--danger); font-weight: 700; padding: 0 4px; opacity: 0.5; }
.del-x:hover { opacity: 1; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state .emoji { font-size: 40px; margin-bottom: 8px; }
.add-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; margin-top: 4px; }
.add-row input { flex: 1; }
@media print { .nav, .btn, .del-x { display: none !important; } .section { display: block !important; page-break-inside: avoid; } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }
</style>

  { id:'honeymoon', label:'Honeymoon' },
];
let activeTab = 'overview';

function renderNav() {
  document.getElementById('nav').innerHTML = TABS.map(t =>
    `<button class="${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}
function switchTab(id) { activeTab = id; renderNav(); render(); }

// ─── Countdown ───
function renderCountdown() {
  const diff = WEDDING_DATE - new Date();
  if (diff <= 0) { document.getElementById('countdown').innerHTML = '<div style="font-size:20px;font-weight:600;">Just Married!</div>'; return; }
  const d = Math.floor(diff/864e5), h = Math.floor((diff%864e5)/36e5), m = Math.floor((diff%36e5)/6e4);
  document.getElementById('countdown').innerHTML = `
    <div class="countdown-item"><div class="num">${d}</div><div class="label">Days</div></div>
    <div class="countdown-item"><div class="num">${h}</div><div class="label">Hours</div></div>
    <div class="countdown-item"><div class="num">${m}</div><div class="label">Minutes</div></div>`;
}
setInterval(renderCountdown, 60000); renderCountdown();

// ─── Helpers ───
function guestStats() {
  const g = S.guests;
  return {
    total: g.reduce((s,x) => s+(Number(x.qty)||1), 0),
    yes: g.filter(x=>x.status==='Yes').reduce((s,x) => s+(Number(x.qty)||1), 0),
    no: g.filter(x=>x.status==='No').reduce((s,x) => s+(Number(x.qty)||1), 0),
    waiting: g.filter(x=>x.status==='Waiting').reduce((s,x) => s+(Number(x.qty)||1), 0),
  };
}
function checkStats() {
  let total=0, checked=0;
  Object.values(S.checklistItems).forEach(items => items.forEach(it => { total++; if(S.checklist[it.id]) checked++; }));
  return {total, checked};
}
function totalSpent() { return Object.values(S.budgetSpent).reduce((s,v) => s+(Number(v)||0), 0); }

// ─── Render router ───
function render() {
  const R = { overview:rOverview, budget:rBudget, guests:rGuests, venues:rVenues, checklist:rChecklist, vendors:rVendors, seating:rSeating, timeline:rTimeline, registry:rRegistry, gifts:rGifts, honeymoon:rHoneymoon };
  document.getElementById('app').innerHTML = R[activeTab]();
  if (activeTab==='overview'||activeTab==='budget') setTimeout(renderCharts, 50);
}

// ─── CHECKLIST ───
function rChecklist() {
  const ck = checkStats();
  return `
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2 style="margin:0">Planning Checklist</h2>
      <span style="font-size:14px;font-weight:600;color:var(--sage)">${ck.checked} / ${ck.total} complete (${pct(ck.checked,ck.total)}%)</span>
    </div>
    <div class="progress-wrap" style="margin-top:12px;margin-bottom:0"><div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${pct(ck.checked,ck.total)}%;background:linear-gradient(90deg,var(--sage),var(--accent))"></div></div></div>
  </div>
  ${Object.entries(S.checklistItems).map(([phase, items]) => {
    const done = items.filter(it => S.checklist[it.id]).length, p = pct(done, items.length);
    return `<div class="card">
      <div class="phase-header" onclick="this.parentElement.querySelector('.cl-body').style.display=this.parentElement.querySelector('.cl-body').style.display==='none'?'block':'none'">
        <h3>${esc(phase)}</h3>
        <span class="phase-count">${done}/${items.length} — ${p}%</span>
      </div>
      <div class="cl-body">
        ${items.map((it, idx) => {
          const checked = S.checklist[it.id];
          return `<div class="check-item ${checked?'checked':''}">
            <input type="checkbox" ${checked?'checked':''} onchange="S.checklist['${it.id}']=this.checked;save();render()">
            <input type="text" value="${esc(it.text)}" class="inline-edit" style="flex:1" onchange="S.checklistItems['${phase}'][${idx}].text=this.value;save()">
            <span class="del-x" onclick="S.checklistItems['${phase}'].splice(${idx},1);save();render()">✕</span>
          </div>`;
        }).join('')}
        <div class="add-row">
          <input type="text" placeholder="+ Add a task..." id="addTask_${phase.replace(/\s/g,'_')}" onkeydown="if(event.key==='Enter')addCheckItem('${phase}',this.value)">
          <button class="btn btn-outline btn-sm" onclick="addCheckItem('${phase}',document.getElementById('addTask_${phase.replace(/\s/g,'_')}').value)">Add</button>
        </div>
      </div>
    </div>`;
  }).join('')}
  <div class="card">
    <button class="btn btn-primary" onclick="addCheckPhase()">+ Add New Phase</button>
  </div>`;
}
function addCheckItem(phase, text) {
  if (!text.trim()) return;
  S.checklistItems[phase].push({id:phase+'_'+uid(), text:text.trim()});
  save(); render();
}
function addCheckPhase() {
  const name = prompt('Phase name (e.g. "2 Weeks Out"):');
  if (name && name.trim()) { S.checklistItems[name.trim()] = []; save(); render(); }
}

  </div>
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">Registry Checklist</h2>
      <button class="btn btn-primary" onclick="addRegCat()">+ Add Category</button>
    </div>
    ${Object.entries(S.registryCats).map(([cat, items]) => {
      const done = items.filter(it => S.registryChecked[it.id]).length;
      return `<div class="registry-cat">
        <div class="registry-cat-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div style="display:flex;align-items:center;gap:8px">
            <span>${esc(cat)}</span>
            <span class="del-x" style="font-size:11px" onclick="event.stopPropagation();delete S.registryCats['${cat}'];save();render()">✕</span>
          </div>
          <span class="badge ${done===items.length&&items.length>0?'badge-yes':'badge-pending'}">${done}/${items.length}</span>
        </div>
        <div class="registry-items" style="display:none">
          ${items.map((it, idx) => `<div class="registry-item">
            <input type="checkbox" ${S.registryChecked[it.id]?'checked':''} onchange="S.registryChecked['${it.id}']=this.checked;save();render()">
            <input type="text" value="${esc(it.text)}" class="inline-edit" style="flex:1;${S.registryChecked[it.id]?'text-decoration:line-through;color:var(--text-light)':''}" onchange="S.registryCats['${cat}'][${idx}].text=this.value;save()">
            <span class="del-x" onclick="S.registryCats['${cat}'].splice(${idx},1);save();render()">✕</span>

            <input type="text" placeholder="+ Add item..." id="addReg_${cat.replace(/[^a-zA-Z]/g,'')}" onkeydown="if(event.key==='Enter')addRegItem('${cat}',this.value)">

          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
function addRegItem(cat, text) { if(!text.trim()) return; S.registryCats[cat].push({id:uid(), text:text.trim()}); save(); render(); }
function addRegCat() { const n=prompt('Category name:'); if(n&&n.trim()){ S.registryCats[n.trim()]=[]; save(); render(); } }

// ─── Charts ───
function renderCharts() {
  const bc = document.getElementById('budgetChart');
  if (bc) new Chart(bc, { type:'doughnut', data:{ labels:S.budgetCats.map(c=>c.name), datasets:[{data:S.budgetCats.map(c=>c.pct), backgroundColor:S.budgetCats.map((_,i)=>COLORS[i%COLORS.length]), borderWidth:2, borderColor:'#fff'}] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'55%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`${ctx.label}: ${ctx.parsed}% (${fmt$(S.budgetTotal*ctx.parsed/100)})` } } } } });
  const gc = document.getElementById('guestChart');
  if (gc) { const gs=guestStats(); new Chart(gc, { type:'doughnut', data:{ labels:['Confirmed','Awaiting','Declined'], datasets:[{data:[gs.yes,gs.waiting,gs.no], backgroundColor:['#8FA68A','#E67E22','#C0392B'], borderWidth:2, borderColor:'#fff'}] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'55%', plugins:{legend:{display:false}} } }); }
  const sc = document.getElementById('spendChart');
  if (sc) new Chart(sc, { type:'bar', data:{ labels:S.budgetCats.map(c=>c.name.length>14?c.name.slice(0,14)+'…':c.name), datasets:[ {label:'Allocated', data:S.budgetCats.map(c=>Math.round(S.budgetTotal*(Number(c.pct)||0)/100)), backgroundColor:'rgba(123,109,94,0.25)', borderRadius:3}, {label:'Spent', data:S.budgetCats.map(c=>Number(S.budgetSpent[c.id])||0), backgroundColor:S.budgetCats.map((_,i)=>COLORS[i%COLORS.length]), borderRadius:3} ] }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}}, scales:{ x:{ticks:{callback:v=>'$'+(v/1000)+'k'},grid:{color:'#F0EDE8'}}, y:{ticks:{font:{size:10}},grid:{display:false}} } } });
}
